name: supabase-backup

# When this workflow runs:
on:
  push:
    branches: [main, dev]         # every time someone pushes to main or dev
  pull_request:
    branches: [main, dev]         # every time a PR is opened/updated against main or dev
  workflow_dispatch:              # lets you trigger it manually from the Actions tab
  schedule:
    - cron: "0 0 * * *"           # also runs automatically every day at midnight (UTC)

env:
  BACKUP_ENABLED: true            # fallback default (overridden by the repo Variable below)

jobs:
  run_db_backup:
    runs-on: ubuntu-latest        # spins up a temporary Ubuntu VM on GitHub's servers
    permissions:
      contents: read              # this job no longer commits anything back to the repo
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}       # your DB connection string, from repo Secrets
      BACKUP_ENABLED: ${{ vars.BACKUP_ENABLED }}      # on/off switch, from repo Variables (true or false)
    steps:
      # Kill switch: if BACKUP_ENABLED isn't "true", stop here and skip every step below
      - name: Check if backups are enabled
        run: |
          if [ "$BACKUP_ENABLED" != "true" ]; then
            echo "Backups are disabled. Exiting workflow."
            exit 0
          fi

      # Pulls your repo's code onto this temporary VM (needed for the restore.sh path etc.)
      - name: Checkout repository
        if: env.BACKUP_ENABLED == 'true'
        uses: actions/checkout@v3

      # Installs the Supabase CLI on this VM (needed to run `supabase db dump`)
      - name: Setup Supabase CLI
        if: env.BACKUP_ENABLED == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Makes sure the output folder exists before we try to write files into it
      - name: Create timestamp folder
        if: env.BACKUP_ENABLED == 'true'
        run: mkdir -p Database/backups

      # Dumps role/permission settings only (small file, no table data)
      - name: Backup roles
        if: env.BACKUP_ENABLED == 'true'
        run: supabase db dump --db-url "$SUPABASE_URL" -f Database/backups/roles.sql --role-only

      # Dumps table structure only (CREATE TABLE statements), scoped to our own "public" schema
      - name: Backup schema
        if: env.BACKUP_ENABLED == 'true'
        run: supabase db dump --db-url "$SUPABASE_URL" -f Database/backups/schema.sql --schema public

      # Dumps actual row data (COPY statements), also scoped to "public" so Supabase's internal
      # auth/storage schemas never end up in here
      - name: Backup data
        if: env.BACKUP_ENABLED == 'true'
        run: supabase db dump --db-url "$SUPABASE_URL" -f Database/backups/data.sql --data-only --use-copy --schema public

      # Encrypts each .sql file into a .sql.gpg file, then deletes the plaintext version
      # so only the encrypted file ever gets committed
      - name: Encrypt backups
        if: env.BACKUP_ENABLED == 'true'
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          for f in Database/backups/roles.sql Database/backups/schema.sql Database/backups/data.sql; do
            gpg --batch --yes --passphrase "$BACKUP_ENCRYPTION_KEY" --symmetric --cipher-algo AES256 -o "$f.gpg" "$f"
            rm "$f"
          done

      # Hard safety net: refuse to upload anything if a plaintext .sql file is
      # still sitting here — this is what would repeat last night's leak if the
      # encrypt step ever fails partway (bad key, gpg error, etc.)
      - name: Verify no plaintext backups remain
        if: success() && env.BACKUP_ENABLED == 'true'
        run: |
          if ls Database/backups/*.sql >/dev/null 2>&1; then
            echo "::error::Plaintext .sql file(s) found in Database/backups — aborting before upload."
            ls Database/backups/*.sql
            exit 1
          fi

      # Installs rclone, the CLI tool used below to talk to Google Drive
      - name: Install rclone
        if: success() && env.BACKUP_ENABLED == 'true'
        run: curl https://rclone.org/install.sh | sudo bash

      # Uploads the encrypted .sql.gpg files straight to a Google Drive folder,
      # authenticating as the service account whose key is in GDRIVE_SERVICE_ACCOUNT_JSON.
      # Nothing gets committed back to GitHub — backups now live only in Drive.
      - name: Upload backups to Google Drive
        if: success() && env.BACKUP_ENABLED == 'true'
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          echo "$GDRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gdrive-sa.json"
          export RCLONE_CONFIG_GDRIVE_TYPE=drive
          export RCLONE_CONFIG_GDRIVE_SCOPE=drive
          export RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/gdrive-sa.json"
          export RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID="$GDRIVE_FOLDER_ID"
          rclone copy Database/backups/ gdrive: -v
          rm -f "$RUNNER_TEMP/gdrive-sa.json"
